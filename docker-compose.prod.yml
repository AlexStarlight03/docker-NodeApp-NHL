services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: tp3_nginx_prod
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: tp3_api_prod
    command: npm start
    env_file:
      - .env
    expose:
      - "5000"
    depends_on:
      - database
    restart: unless-stopped

  database:
    image: mongo:7
    container_name: tp3_database_prod
    expose:
      - "27017"
    volumes:
      - database_data:/data/db
    restart: unless-stopped

volumes:
  database_data:
